version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        # Bake dashboard env vars into .env.production so Next.js SSR compute can
        # read them at runtime (Amplify dashboard vars are otherwise build-time only).
        - env | grep -e ANTHROPIC_API_KEY >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
